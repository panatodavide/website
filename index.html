  <style>
    /* ============================================
       EASY TO EDIT: Change colors here
       ============================================ */
    :root {
      --color-primary: #0096D6;   /* HP Blue */
      --color-dark: #111111;
      --color-text: #333333;
      --color-light-text: #666666;
      --color-bg: #ffffff;
      --color-light-bg: #f7f9fc;
      --color-border: #e2e8f0;
      --font-main: 'Inter', sans-serif;
    }

    /* ============================================
       RESET & BASE
       ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-main);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    a:hover { color: #007ab8; }

    img { max-width: 100%; display: block; }

    /* ============================================
       NAVIGATION
       ============================================ */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-border);
      z-index: 1000;
      padding: 0 2rem;
    }

    nav .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }

    nav .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--color-dark);
    }

    nav .nav-links { display: flex; gap: 2rem; list-style: none; }

    nav .nav-links a {
      color: var(--color-text);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    nav .nav-links a:hover { color: var(--color-primary); }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--color-dark);
      margin: 5px 0;
      transition: 0.3s;
    }

    /* ============================================
       SECTIONS
       ============================================ */
    section { padding: 5rem 2rem; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 0.5rem;
    }

    .section-subtitle {
      color: var(--color-light-text);
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .accent-line {
      width: 50px;
      height: 3px;
      background: var(--color-primary);
      margin-bottom: 2rem;
      border-radius: 2px;
    }

    /* ============================================
       HERO
       ============================================ */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 60px;
